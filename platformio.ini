; PlatformIO Project Configuration File — fancontrol
; Plošča: TZT ESP32-S3-N16R8 (16MB Flash, 8MB PSRAM OPI)
;   - ESP32-S3 dual-core LX7, 240MHz
;   - 16MB Flash QIO, 8MB PSRAM OPI
;
; Senzorji (I2C, GPIO 8/9):
;   - SHT30  (temperatura, vlažnost)
;   - INA219 (napetost, tok, moč — Mini PC 12V veja)
;
; ePaper (SPI, GPIO 10–15):
;   - WeAct Studio 2.9" B/W 296x128 px
;
; Ventilator:
;   - 12V axial 2-pin, PWM via LR7843 MOSFET (GPIO 5)
;
; https://docs.platformio.org/page/projectconf.html

[common]
build_flags_base =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -DARDUINO_LOOP_STACK_SIZE=8192
    -std=c++17
    -I.
    -Isrc

[env:esp32s3]
platform         = espressif32
; platform_packages = framework-arduinoespressif32 @ ~3.20014.0
board            = esp32-s3-devkitc-1
framework        = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
monitor_dtr     = 0
monitor_rts     = 0

upload_speed = 921600

build_flags =
    ${common.build_flags_base}

board_build.partitions          = partitions_16mb_ota.csv
board_build.flash_size          = 16MB
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_opi
board_build.psram_type          = opi

lib_deps =
    ; --- Web / JSON ---
    me-no-dev/AsyncTCP
    me-no-dev/ESPAsyncWebServer
    bblanchon/ArduinoJson @ ^6.21.0

    ; --- Čas ---
    ropg/ezTime

    ; --- ePaper ---
    zinggjm/GxEPD2 @ ^1.6.0
    olikraus/U8g2_for_Adafruit_GFX

    ; --- Senzorji ---
    adafruit/Adafruit SHT31 Library @ ^2.2.2
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit BusIO @ ^1.14.5

